---
name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Generate release notes
        run: |
          node --import tsx ./scripts/generate-release-notes.ts \
            "${{ github.ref_name }}" \
            "$RUNNER_TEMP/release-notes.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: DIFF ${{ github.ref_name }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            dist/*
